app-id: rocks.noise.qspeakers
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: qspeakers
rename-desktop-file: qspeakers.desktop
rename-icon: qspeakers
copy-icon: true
finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=fallback-x11
  # Wayland access
  - --socket=wayland
  - --device=dri
modules:
  - name: qspeakers
    buildsystem: qmake
    sources:
      - type: git
        url: https://github.com/be1/qspeakers.git
        tag: 1.8.6
        commit: c86fdb77a3bc209ad2b8c4502c550a08fd6b9882
        x-checker-data:
          type: git
          tag-pattern: ^(\d.+)$
